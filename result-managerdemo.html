<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Student Result Manager</h1>

    <div class="form">
      <input type="text" id="nameInput" placeholder="Student Name" />

      <input type="number" id="math" placeholder="Math Marks" />
      <input type="number" id="science" placeholder="Science Marks" />
      <input type="number" id="english" placeholder="English Marks" />

      <button onclick="addRecord()">Add Record</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Name</th>
          <th>Math</th>
          <th>Science</th>
          <th>English</th>
          <th>Total</th>
          <th>Average</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <script src="script.js"></script>
  </body>
</html>
