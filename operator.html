<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operator</title>
  </head>
  <body>
    <script>
      let sum = 0;
      for (let i = 0; i <= 6; i++) {
        console.log(i);
        sum += i;
      }
      console.log(`total=${sum}`);
      sum = 1;
      for (let j = 0; j < 10; ++j) {
        console.log(j);
        sum += j;
      }
      console.log(`total=${sum}`);
    </script>
  </body>
</html>
