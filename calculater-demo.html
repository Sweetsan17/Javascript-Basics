<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculater</title>
  </head>
  <body>
    <h1>Basic Calculator</h1>
    <label for="num1">Number 1</label
    ><input type="text" name="num1" id="num1" /> <br /><br />
    <label for="num2">Number 2</label>
    <input type="text" name="num2" id="num2" /> <br /><br />
    <label for="result">Result</label
    ><input type="text" name="result" id="result" /> <br /><br />
    <button onclick="add()">Add</button>
    <button onclick="sub()">sub</button>
    <button onclick="mul()">mul</button>
    <button onclick="div()">div</button>
    <script>
      function add() {
        const number1 = document.getElementById("num1").value;
        const number2 = document.getElementById("num2").value;
        const result = Number(number1) + Number(number2);
        document.getElementById("result").value = result;
      }

      function sub() {
        const number3 = document.getElementById("num1").value;
        const number4 = document.getElementById("num2").value;
        const result = Number(number3) - Number(number4);
        document.getElementById("result").value = result;
      }

      function mul() {
        const number5 = document.getElementById("num1").value;
        const number6 = document.getElementById("num2").value;
        const result = Number(number5) * Number(number6);
        document.getElementById("result").value = result;
      }

      function div() {
        const number7 = document.getElementById("num1").value;
        const number8 = document.getElementById("num2").value;
        const result = Number(number7) / Number(number8);
        document.getElementById("result").value = result;
      }
    </script>
  </body>
</html>
