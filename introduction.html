<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Demo</title>
  </head>
  <body>
    <h1>Welcome to JavaScript</h1>
    <button id="mybutton">Click Me</button>
    <script>
      // window.alert("hackers here");
      console.log("Subi");
      console.log("5+6");
      console.log(10 + 34);
      console.error("danger vulnerability here");
      console.log(typeof "Grade02");
      console.log(typeof grade2);
      console.warn("MIMA HERE");
      console.warn("Some one hacks your Server");
      let age = 20;
      console.log(age);
      age = 30;
      console.log(age);
      const pi = 3.14;
      console.log(pi);
      let studentName = "Sweetsan";
      console.log(studentName);
      // regular object
      let student = { name: "Sweetsan", age: 20 };
      console.log(student);
      // function
      function greet() {
        console.log("hello");
      }
      greet();
      // Date object
      // let today=newdate(12/10/2026);
      student = { name: "AntonySweetsan", age: 20, country: "America" };
      console.log(student);
      greet();
      // Dynamic HTML interaction:
      document.getElementById("mybutton").onclick = () => {
        alert("Button clicked!");
      };
    </script>

</html>
