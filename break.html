<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Break</title>
  </head>
  <body>
    <h1>Break JS</h1>
    <script>
      let i = 1;

      while (i <= 10) {
        if (i == 7) {
          console.log("Lucky 7 found! Stopping...");
          break; // The loop exits here
        }
        console.log("Checking number: " + i);
        i++;
      }
      let a = 1;

      while (a <= 10) {
        if (a == 5) {
          console.log(a);
          break;
        }
        console.log("LOQ" + " " + a);
        a++;
      }
      for (let c = 1; c < 8; c++) {
        if (c == 3) {
          console.log(c);
          continue;
        } else {
          console.log("hello JS");
        }
        console.log("man" + " " + c);
      }
    </script>
  </body>
</html>
